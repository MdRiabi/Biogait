version: "3.8"
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: biogait
      POSTGRES_PASSWORD: biogaitsecret
      POSTGRES_DB: biogait
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - biogait-net

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - biogait-net

  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+asyncpg://biogait:biogaitsecret@db:5432/biogait
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-prod
      DEBUG: "True"
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    networks:
      - biogait-net

volumes:
  postgres_data:
  redis_data:

networks:
  biogait-net:
    driver: bridge