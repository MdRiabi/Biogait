services:
  db:
    image: postgres:15-alpine
    container_name: biogait-db
    environment:
      POSTGRES_USER: biogait
      POSTGRES_PASSWORD: biogaitsecret
      POSTGRES_DB: biogait
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Schéma + base de tests (uniquement au premier montage du volume)
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biogait -d biogait"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - biogait-net

  redis:
    image: redis:7-alpine
    container_name: biogait-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - biogait-net

volumes:
  pg_data:
  redis_data:

networks:
  biogait-net:
    driver: bridge